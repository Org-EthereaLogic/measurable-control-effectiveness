name: CI — Lint, Test, Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CODECOV_PROJECT_TOKEN: ${{ secrets.CODECOV_PROJECT_TOKEN }}
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
      ENFORCE_CODACY_COVERAGE: ${{ vars.ENFORCE_CODACY_COVERAGE }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests with coverage
        run: pytest -q --tb=short --cov=benchmark --cov-report=xml --cov-report=term

      - name: Install Codecov CLI
        if: matrix.python-version == '3.12' && env.CODECOV_PROJECT_TOKEN != ''
        run: python -m pip install codecov-cli

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && env.CODECOV_PROJECT_TOKEN != ''
        env:
          CODECOV_TOKEN: ${{ env.CODECOV_PROJECT_TOKEN }}
        run: codecovcli --verbose upload-process --disable-search -t "$CODECOV_TOKEN" -f coverage.xml -n "python-${{ matrix.python-version }}-${{ github.run_id }}"

      - name: Skip Codacy upload unless explicitly enforced
        if: matrix.python-version == '3.12' && env.ENFORCE_CODACY_COVERAGE != 'true'
        run: echo "Skipping Codacy upload — set ENFORCE_CODACY_COVERAGE=true with a valid Codacy token to enforce this check."

      - name: Fail when Codacy enforcement is enabled without credentials
        if: matrix.python-version == '3.12' && env.ENFORCE_CODACY_COVERAGE == 'true' && env.CODACY_PROJECT_TOKEN == '' && env.CODACY_API_TOKEN == ''
        run: |
          echo "::error::ENFORCE_CODACY_COVERAGE=true but no Codacy token is configured."
          exit 1

      - name: Upload coverage to Codacy
        if: matrix.python-version == '3.12' && env.ENFORCE_CODACY_COVERAGE == 'true' && (env.CODACY_PROJECT_TOKEN != '' || env.CODACY_API_TOKEN != '')
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ env.CODACY_PROJECT_TOKEN }}
          api-token: ${{ env.CODACY_API_TOKEN }}
          coverage-reports: coverage.xml

  benchmark-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run benchmark smoke test
        run: |
          evidence_dir="$(mktemp -d)"
          python -m benchmark.runners \
            --seed 42 \
            --rows 1000 \
            --evidence-dir "$evidence_dir"
          ls "$evidence_dir"/bench_42_*.json

  snyk-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      ENFORCE_SNYK_SCAN: ${{ vars.ENFORCE_SNYK_SCAN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Skip Snyk unless explicitly enforced
        if: env.ENFORCE_SNYK_SCAN != 'true'
        run: echo "Skipping Snyk — set ENFORCE_SNYK_SCAN=true with a valid SNYK_TOKEN to enforce this check."

      - name: Fail when Snyk enforcement is enabled without credentials
        if: env.ENFORCE_SNYK_SCAN == 'true' && env.SNYK_TOKEN == ''
        run: |
          echo "::error::ENFORCE_SNYK_SCAN=true but SNYK_TOKEN is not configured."
          exit 1

      - name: Set up Python 3.12 for Snyk
        if: env.ENFORCE_SNYK_SCAN == 'true' && env.SNYK_TOKEN != ''
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies for Snyk
        if: env.ENFORCE_SNYK_SCAN == 'true' && env.SNYK_TOKEN != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Snyk CLI
        if: env.ENFORCE_SNYK_SCAN == 'true' && env.SNYK_TOKEN != ''
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1

      - name: Run Snyk to check for vulnerabilities
        if: env.ENFORCE_SNYK_SCAN == 'true' && env.SNYK_TOKEN != ''
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        run: snyk test --file=requirements.txt --package-manager=pip --command=python3 --severity-threshold=high
