name: CI — Lint, Test, Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      CODECOV_PROJECT_TOKEN: ${{ secrets.CODECOV_PROJECT_TOKEN }}
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests with coverage
        run: pytest -q --tb=short --cov=benchmark --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && env.CODECOV_PROJECT_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_PROJECT_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage to Codacy
        if: matrix.python-version == '3.12' && env.CODACY_PROJECT_TOKEN != ''
        continue-on-error: true
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ env.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml

  benchmark-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run benchmark smoke test
        run: |
          evidence_dir="$(mktemp -d)"
          python -m benchmark.runners \
            --seed 42 \
            --rows 1000 \
            --evidence-dir "$evidence_dir"
          ls "$evidence_dir"/bench_42_*.json

  snyk-security:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip Snyk when token is unavailable
        if: env.SNYK_TOKEN == ''
        run: echo "Skipping Snyk — SNYK_TOKEN not configured."

      - name: Run Snyk to check for vulnerabilities
        if: env.SNYK_TOKEN != ''
        continue-on-error: true
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
